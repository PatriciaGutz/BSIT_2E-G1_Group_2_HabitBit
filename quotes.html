<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HabitBit - Manage Quotes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div
        class="bg-white p-4 rounded-4 shadow-sm border mx-auto"
        style="max-width: 500px"
      >
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0 text-dark">My Wisdom Bits</h3>
          <a href="dashboard.html" class="btn-close" aria-label="Close"></a>
        </div>

        <div class="input-group mb-4">
          <input
            type="text"
            id="newQuoteInput"
            class="form-control"
            placeholder="Add a motivational bit..."
            maxlength="100"
          />
          <button
            class="btn text-white"
            style="background-color: #77d0a0"
            onclick="addNewQuote()"
          >
            Add
          </button>
        </div>

        <div id="quoteList"></div>

        <hr class="mt-5" />
        <div class="text-center">
          <a
            href="dashboard.html"
            class="text-decoration-none fw-bold"
            style="color: #ffb347"
            >← Back to Dashboard</a
          >
        </div>
      </div>
    </div>

    <script>
      // Load/View Logic: Kukunin ang listahan sa LocalStorage
      let customQuotes =
        JSON.parse(localStorage.getItem("userQuotesList")) || [];

      function renderQuotes() {
        const list = document.getElementById("quoteList");
        if (customQuotes.length === 0) {
          list.innerHTML = `<p class="text-muted text-center small">No custom bits yet. Add your first one above!</p>`;
          return;
        }

        list.innerHTML = customQuotes
          .map(
            (q, i) => `
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 rounded-3 bg-light border">
                    <span class="small fw-medium text-dark" style="flex: 1; padding-right: 10px;">${q}</span>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm text-primary border-0" onclick="editQuote(${i})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm text-danger border-0" onclick="deleteQuote(${i})"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      //Add Logic
      window.addNewQuote = function () {
        const input = document.getElementById("newQuoteInput");
        const val = input.value.trim();
        if (val) {
          customQuotes.push(val);
          localStorage.setItem("userQuotesList", JSON.stringify(customQuotes));
          input.value = "";
          renderQuotes();
        }
      };

      // Edit Logic
      window.editQuote = function (index) {
        const updated = prompt("Update your quote:", customQuotes[index]);
        if (updated !== null && updated.trim() !== "") {
          customQuotes[index] = updated.trim();
          localStorage.setItem("userQuotesList", JSON.stringify(customQuotes));
          renderQuotes();
        }
      };

      // Delete Logic
      window.deleteQuote = function (index) {
        if (confirm("Remove this quote?")) {
          customQuotes.splice(index, 1);
          localStorage.setItem("userQuotesList", JSON.stringify(customQuotes));
          renderQuotes();
        }
      };

      // Initial render
      renderQuotes();
    </script>
  </body>
</html>
